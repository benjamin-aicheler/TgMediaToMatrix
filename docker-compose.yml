services:
  telegram-matrix-bridge:
    image: python:3.14-slim
    container_name: tg_matrix_media_bridge
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./session_data:/app/session
    working_dir: /app
    command: sh -c "pip install --no-cache-dir telethon matrix-nio av Pillow && python bridge.py"
    environment:
      - TG_API_ID=
      - TG_API_HASH=
      - MATRIX_HOMESERVER=
      - MATRIX_ACCESS_TOKEN=
      - MATRIX_ROOM_ID=
      - TG_CHANNELS=
      - MAX_MEDIA_SIZE_MB=80
      - ENABLE_IMAGES=true
      - ENABLE_VIDEOS=true
      - LLAMAGUARD_API_URL=
      - LLAMAGUARD_MODEL_NAME=meta-llama/llama-guard-4-12b
      - LLAMAGUARD_API_KEY=
      - LLAMAGUARD_CHECKS=
      - LLAMAGUARD_REQUIRE_CHECKS=
      - LLAMAGUARD_VIDEO_FRAMES=5
      - LLAMAGUARD_RANDOM_FRAMES=true


